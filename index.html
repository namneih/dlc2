<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Asia-Star DLC2 CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh}

.hdr{background:linear-gradient(135deg,#064e3b,#065f46);padding:12px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr h1{color:#fff;font-size:16px;font-weight:700}
.hdr p{color:#6ee7b7;font-size:11px;margin-top:2px}
.sync-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
.sdot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0}
.sdot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sdot.error{background:#dc2626}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e8ecf0;position:sticky;top:56px;z-index:99}
.tab-item{flex:1;text-align:center;padding:10px 4px 8px;font-size:12px;font-weight:600;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-item.active{color:#065f46;border-bottom-color:#065f46}
.tbadge{background:#dc2626;color:#fff;border-radius:10px;padding:0 5px;font-size:9px;margin-left:2px;display:none}

/* Stats */
.stats-bar{display:flex;gap:6px;padding:8px 10px;background:#fff;border-bottom:1px solid #e8ecf0;overflow-x:auto}
.stat{background:#f8f9fb;border-radius:8px;padding:5px 10px;text-align:center;min-width:58px;flex-shrink:0;cursor:pointer;border:1.5px solid transparent}
.stat.active{border-color:#065f46;background:#ecfdf5}
.snum{font-size:15px;font-weight:700;color:#1a1a2e}
.slbl{font-size:9px;color:#888;margin-top:1px;white-space:nowrap}
.stat.red .snum{color:#dc2626}.stat.orange .snum{color:#ea580c}
.stat.blue .snum{color:#2563eb}.stat.yellow .snum{color:#d97706}
.stat.green .snum{color:#059669}.stat.gray .snum{color:#6b7280}

/* Filters */
.filters{background:#fff;padding:8px 10px;border-bottom:1px solid #e8ecf0;display:flex;flex-direction:column;gap:6px}
.frow{display:flex;gap:6px}
select,input[type=text],input[type=tel],input[type=date]{height:34px;border:1.5px solid #dde1e7;border-radius:8px;padding:0 9px;font-size:14px;color:#1a1a2e;background:#fff;outline:none;flex:1;min-width:0}
select:focus,input:focus{border-color:#065f46}
.btn{height:34px;border-radius:8px;border:none;padding:0 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-green{background:#065f46;color:#fff}
.btn-gray{background:#f1f3f5;color:#555;border:1px solid #dde1e7}
.btn-blue{background:#2563eb;color:#fff}
.btn-red{background:#dc2626;color:#fff}

.panel{flex:1;overflow-y:auto;padding:8px 10px}

/* Card */
.card{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid #d1d5db}
.card.s-chuagoi{border-left-color:#9ca3af}
.card.s-khongnhe{border-left-color:#dc2626}
.card.s-quantam{border-left-color:#2563eb}
.card.s-choxem{border-left-color:#d97706}
.card.s-chot{border-left-color:#059669}
.card.s-khongtt{border-left-color:#e5e7eb}
.card.s-chuaquan{border-left-color:#f97316}

.card-top{padding:10px 12px 6px}
.cname{font-size:13px;font-weight:600;color:#1a1a2e;line-height:1.3}
.cmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;align-items:center}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;background:#f1f5f9;color:#475569}
.chip.tinh{background:#ecfdf5;color:#065f46}
.chip.loai{background:#f8f9fb;color:#6b7280}

/* SĐT - phần quan trọng nhất */
.sdt-section{padding:6px 12px 8px}
.call-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#065f46;color:#fff;border:none;border-radius:10px;padding:10px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;width:100%;letter-spacing:.5px}
.call-btn:active{background:#047857}
.no-sdt{text-align:center;font-size:12px;color:#9ca3af;padding:8px;font-style:italic}

/* Actions */
.card-acts{display:flex;align-items:center;gap:5px;padding:0 12px 8px}
.ebtn{font-size:11px;background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7;border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:500}
.qbtn{font-size:10px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:6px;padding:3px 7px;cursor:pointer}
.ssel{height:28px;border-radius:6px;border:1.5px solid #dde1e7;font-size:11px;padding:0 4px;color:#374151;background:#fff;cursor:pointer;flex:1;min-width:100px}

.note-bar{display:flex;align-items:center;gap:6px;padding:4px 12px 8px;border-top:1px solid #f3f4f6}
.note-txt{font-size:11px;color:#6b7280;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-emp{font-size:11px;color:#d1d5db;font-style:italic}
.fu-bar{padding:0 12px 8px}
.fu-tag{font-size:10px;padding:2px 10px;border-radius:20px;font-weight:600;display:inline-block}
.fu-od{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;animation:blink .8s infinite}
.fu-td{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
.fu-ft{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* Status dots */
.sdot-s{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-chuagoi{background:#9ca3af}.d-khongnhe{background:#dc2626}
.d-quantam{background:#2563eb}.d-choxem{background:#d97706}
.d-chot{background:#059669}.d-khongtt{background:#e5e7eb}
.d-chuaquan{background:#f97316}

/* Calendar */
.cal-banner{background:linear-gradient(135deg,#065f46,#0369a1);color:#fff;padding:12px 14px;border-radius:10px;margin-bottom:10px}
.cal-banner h2{font-size:15px;font-weight:700}
.cal-banner p{font-size:11px;opacity:.85;margin-top:2px}
.sec-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px;padding-bottom:4px;border-bottom-width:2px;border-bottom-style:solid}
.cal-card{background:#fff;border-radius:10px;margin-bottom:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid #065f46}
.cal-card-body{padding:10px 12px 6px}
.cal-card-name{font-size:13px;font-weight:600;color:#1a1a2e}
.cal-card-meta{font-size:11px;color:#6b7280;margin-top:3px}
.cal-card-acts{display:flex;gap:6px;padding:6px 12px 10px;align-items:center}
.cal-empty{text-align:center;padding:40px 20px;color:#9ca3af}

/* Báo cáo */
.rpt-banner{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:#fff;padding:14px;border-radius:10px;margin-bottom:12px}
.rpt-banner h2{font-size:15px;font-weight:700}
.rpt-banner p{font-size:11px;opacity:.8;margin-top:2px}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.rpt-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.07);text-align:center}
.rpt-num{font-size:26px;font-weight:700;color:#1a1a2e}
.rpt-lbl{font-size:11px;color:#6b7280;margin-top:3px}
.rpt-card.green .rpt-num{color:#059669}
.rpt-card.blue .rpt-num{color:#2563eb}
.rpt-card.orange .rpt-num{color:#d97706}
.rpt-card.red .rpt-num{color:#dc2626}
.rpt-bar-wrap{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:8px}
.rpt-bar-title{font-size:12px;font-weight:600;color:#374151;margin-bottom:10px}
.rpt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rpt-row-lbl{font-size:11px;color:#6b7280;width:120px;flex-shrink:0}
.rpt-row-bar{flex:1;background:#f3f4f6;border-radius:4px;height:8px;overflow:hidden}
.rpt-row-fill{height:100%;border-radius:4px;transition:width .5s}
.rpt-row-cnt{font-size:11px;font-weight:600;color:#374151;width:30px;text-align:right;flex-shrink:0}
.tinh-grid{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.tinh-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.tinh-row:last-child{border-bottom:none}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h3{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
.ff{margin-bottom:10px}
.ff label{font-size:10px;font-weight:700;color:#6b7280;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.ff input,.ff select,.ff textarea{width:100%;border:1.5px solid #dde1e7;border-radius:8px;padding:8px 10px;font-size:14px;color:#1a1a2e;background:#fff;outline:none}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:#065f46}
.ff textarea{height:80px;resize:none;line-height:1.5}
.ff-hint{font-size:10px;color:#9ca3af;margin-top:3px}
.fu-quick{background:#f8f9fb;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb;margin-top:8px;display:none}
.fu-quick-lbl{font-size:11px;color:#6b7280;font-weight:600;margin-bottom:8px}
.fu-btns{display:flex;flex-wrap:wrap;gap:6px}
.fu-btn{background:#fff;border:1.5px solid #dde1e7;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;color:#374151}
.fu-btn.b{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.fu-btn.o{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
.macts{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #f3f4f6}
.macts .btn{flex:1;height:40px;font-size:13px}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 20px;color:#9ca3af}
mark{background:#fef08a;border-radius:2px;padding:0 1px}
.fab{position:fixed;bottom:16px;right:16px;z-index:200}
.fab-btn{height:42px;border-radius:21px;border:none;padding:0 18px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);color:#fff;background:#065f46}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div><h1>🟢 Asia-Star DLC2</h1><p id="hsub">Đang tải...</p></div>
    <button class="sync-btn" onclick="syncNow()">
      <div class="sdot" id="sdot"></div><span id="slbl">Đồng bộ</span>
    </button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tab-list" onclick="switchTab('list')">📋 Danh sách</div>
  <div class="tab-item" id="tab-cal" onclick="switchTab('cal')">📅 Lịch <span class="tbadge" id="cal-badge"></span></div>
  <div class="tab-item" id="tab-rpt" onclick="switchTab('rpt')">📊 Báo cáo</div>
</div>

<!-- WRAP LIST -->
<div id="wrap-list">
  <div class="stats-bar">
    <div class="stat active" onclick="fST('')" id="st-all"><div class="snum" id="sn-all">0</div><div class="slbl">Tất cả</div></div>
    <div class="stat" onclick="fST('chuagoi')" id="st-chuagoi"><div class="snum" id="sn-chuagoi">0</div><div class="slbl">Chưa gọi</div></div>
    <div class="stat red" onclick="fST('khongnhe')" id="st-khongnhe"><div class="snum" id="sn-khongnhe">0</div><div class="slbl">Không nghe</div></div>
    <div class="stat orange" onclick="fST('chuaquan')" id="st-chuaquan"><div class="snum" id="sn-chuaquan">0</div><div class="slbl">Chưa QT</div></div>
    <div class="stat blue" onclick="fST('quantam')" id="st-quantam"><div class="snum" id="sn-quantam">0</div><div class="slbl">Quan tâm</div></div>
    <div class="stat yellow" onclick="fST('choxem')" id="st-choxem"><div class="snum" id="sn-choxem">0</div><div class="slbl">Chờ giá</div></div>
    <div class="stat green" onclick="fST('chot')" id="st-chot"><div class="snum" id="sn-chot">0</div><div class="slbl">Chốt đơn</div></div>
  </div>
  <div class="filters">
    <div class="frow">
      <input type="text" id="fsearch" placeholder="🔍 Tìm tên, SĐT..." oninput="applyF()">
    </div>
    <div class="frow">
      <select id="ftinh" onchange="applyF()"><option value="">📍 Tất cả tỉnh</option></select>
      <select id="floai" onchange="applyF()"><option value="">🏪 Tất cả loại</option></select>
      <button class="btn btn-gray" onclick="resetF()">↺</button>
      <button class="btn btn-blue" onclick="doExport()">📥</button>
    </div>
  </div>
  <div class="panel" id="list-panel"></div>
</div>

<!-- WRAP CAL -->
<div id="wrap-cal" style="display:none">
  <div class="panel" id="cal-panel"></div>
</div>

<!-- WRAP REPORT -->
<div id="wrap-rpt" style="display:none">
  <div class="panel" id="rpt-panel"></div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="edit-modal" style="display:none" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3 id="edit-title">✏️ Cập nhật</h3>
    <div class="ff"><label>📞 Số điện thoại</label><input id="e-sdt" type="tel" placeholder="0912345678"></div>
    <div class="ff"><label>Trạng thái</label>
      <select id="e-status" onchange="onSTC(this.value)">
        <option value="chuagoi">⚪ Chưa gọi</option>
        <option value="khongnhe">🔴 Không nghe / Không liên lạc</option>
        <option value="chuaquan">🟠 Không/Chưa quan tâm</option>
        <option value="quantam">🔵 Quan tâm — đã gửi báo giá/mẫu</option>
        <option value="choxem">🟡 Đang chờ — khách hỏi giá nhập</option>
        <option value="chot">🟢 Chốt đơn</option>
        <option value="khongtt">⚫ Không tiếp tục</option>
      </select>
      <div class="fu-quick" id="fu-quick">
        <div class="fu-quick-lbl">⚡ Hẹn gọi lại nhanh:</div>
        <div class="fu-btns">
          <button class="fu-btn" onclick="setFU(1)">📅 Ngày mai</button>
          <button class="fu-btn" onclick="setFU(3)">📅 3 ngày</button>
          <button class="fu-btn" onclick="setFU(7)">📅 1 tuần</button>
          <button class="fu-btn b" onclick="setFU(30)">📅 1 tháng</button>
          <button class="fu-btn o" onclick="setFU(60)">📅 2 tháng</button>
        </div>
        <div class="ff-hint">Hoặc chọn ngày cụ thể ↓</div>
      </div>
    </div>
    <div class="ff"><label>📅 Hẹn gọi lại</label>
      <input type="date" id="e-followup">
      <div class="ff-hint">Để trống nếu không cần nhắc</div>
    </div>
    <div class="ff"><label>Ghi chú</label>
      <textarea id="e-note" placeholder="Đã gửi mẫu ngày..., đơn hàng..., giá KH đang nhập..., cần follow up..."></textarea>
    </div>
    <div class="macts">
      <button class="btn btn-green" onclick="saveEdit()">💾 Lưu & Đồng bộ</button>
      <button class="btn btn-gray" onclick="closeEdit()">Huỷ</button>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-bg" id="add-modal" style="display:none" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <h3>➕ Thêm khách hàng mới</h3>
    <div class="ff"><label>Tên cửa hàng *</label><input id="a-ten" placeholder="VD: Cửa hàng VLXD Minh Hùng"></div>
    <div class="ff"><label>📞 Số điện thoại *</label><input id="a-sdt" type="tel" placeholder="0912345678"></div>
    <div class="ff"><label>Tỉnh / Thành phố</label>
      <select id="a-tinh"><option value="">-- Chọn tỉnh --</option></select>
    </div>
    <div class="ff"><label>Loại hình</label><input id="a-loai" placeholder="VD: Cửa hàng VLXD, Đại lý..."></div>
    <div class="ff"><label>📅 Hẹn gọi lại</label><input type="date" id="a-followup"></div>
    <div class="ff"><label>Ghi chú</label><textarea id="a-note" placeholder="Gặp tại..., do ai giới thiệu..."></textarea></div>
    <div class="macts">
      <button class="btn btn-green" onclick="addContact()">✓ Thêm & Đồng bộ</button>
      <button class="btn btn-gray" onclick="closeAdd()">Huỷ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="fab"><button class="fab-btn" onclick="showAdd()">➕ Thêm mới</button></div>

<script>
const APIKEY='$2a$10$Tn4au7VqJNGyi.5Www1R2OROdJpgL5z.Zzlwnbu.WikUffbPuU/a2';

const ST={
  chuagoi: {label:'Chưa gọi',       dot:'d-chuagoi',  color:'#9ca3af'},
  khongnhe:{label:'Không nghe',      dot:'d-khongnhe', color:'#dc2626'},
  chuaquan:{label:'Chưa quan tâm',   dot:'d-chuaquan', color:'#f97316'},
  quantam: {label:'Quan tâm',        dot:'d-quantam',  color:'#2563eb'},
  choxem:  {label:'Chờ giá nhập',    dot:'d-choxem',   color:'#d97706'},
  chot:    {label:'Chốt đơn',        dot:'d-chot',     color:'#059669'},
  khongtt: {label:'Không tiếp tục',  dot:'d-khongtt',  color:'#e5e7eb'},
};
function gST(s){return ST[s]||ST.chuagoi;}
const NEED_FU=['khongnhe','chuaquan','quantam','choxem'];

let DATA=[],OV={},CUSTOM=[],HIDDEN=[];
let filtered=[],activeST='',editId=null,syncT=null;

function el(id){return document.getElementById(id);}
function sv(id,v){const e=el(id);if(e)e.value=v||'';}
function gv(id){const e=el(id);return e?(e.value||'').trim():'';}
function today(){return new Date().toISOString().slice(0,10);}
function showToast(msg){
  const t=el('toast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function hl(t,q){
  if(!q||!t)return t||'';
  return t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
}

// ── CLOUD ─────────────────────────────────────────────────────────────────────
function setSS(s,l){
  const d=el('sdot'),lb=el('slbl');
  if(d)d.className='sdot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  if(lb)lb.textContent=l;
}
async function loadCloud(){
  setSS('syncing','Đang tải...');
  try{
    const r=await fetch(BURL+'/latest',{headers:{'X-Master-Key':APIKEY,'X-Bin-Meta':'false'}});
    if(!r.ok)throw 0;
    const j=await r.json();
    OV=j.overrides||{};CUSTOM=j.custom||[];HIDDEN=j.hidden||[];
    setSS('ok','Đã đồng bộ');showToast('✅ Đã tải từ cloud');
  }catch{
    setSS('error','Lỗi kết nối');showToast('⚠️ Dùng bản local');
    try{OV=JSON.parse(localStorage.getItem('dlc2_ov')||'{}')}catch{}
    try{CUSTOM=JSON.parse(localStorage.getItem('dlc2_cu')||'[]')}catch{}
    try{HIDDEN=JSON.parse(localStorage.getItem('dlc2_hd')||'[]')}catch{}
  }
  mergeData();
}
async function saveCloud(){
  setSS('syncing','Đang lưu...');
  try{
    const r=await fetch(BURL,{method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':APIKEY},
      body:JSON.stringify({overrides:OV,custom:CUSTOM,hidden:HIDDEN})});
    if(!r.ok)throw 0;
    setSS('ok','Đã lưu');showToast('☁️ Đồng bộ thành công');
  }catch{setSS('error','Lỗi lưu');showToast('⚠️ Đã lưu local');}
  localStorage.setItem('dlc2_ov',JSON.stringify(OV));
  localStorage.setItem('dlc2_cu',JSON.stringify(CUSTOM));
  localStorage.setItem('dlc2_hd',JSON.stringify(HIDDEN));
}
function syncNow(){loadCloud().then(()=>{applyF();if(document.getElementById('wrap-rpt').style.display!=='none')renderRpt();});}
function schedSync(){clearTimeout(syncT);syncT=setTimeout(saveCloud,3000);}

// ── MERGE DATA ────────────────────────────────────────────────────────────────
function mergeData(){
  const hid=new Set(HIDDEN);
  DATA=RAW.filter(r=>!hid.has(r.id)).map(r=>{
    const ov=OV[r.id]||{};
    return{...r,
      status:   ov.status   ||'chuagoi',
      sdt:      ov.sdt      !==undefined?ov.sdt      :r.sdt,
      note:     ov.note     !==undefined?ov.note     :'',
      followup: ov.followup !==undefined?ov.followup :'',
    };
  });
  CUSTOM.filter(r=>!hid.has(r.id)).forEach(r=>DATA.push({
    ...r,_new:true,
    status:r.status||'chuagoi',
    note:r.note||'',
    followup:r.followup||'',
  }));
  buildDropdowns();
}
function updOV(id,patch){
  if(!OV[id])OV[id]={};Object.assign(OV[id],patch);
  const r=DATA.find(x=>x.id===id);if(r)Object.assign(r,patch);
}

// ── DROPDOWNS ─────────────────────────────────────────────────────────────────
function buildDropdowns(){
  const tinhs=[...new Set(DATA.map(r=>r.tinh).filter(Boolean))].sort();
  const loais=[...new Set(DATA.map(r=>r.loai).filter(Boolean))].sort();
  ['ftinh','a-tinh'].forEach(id=>{
    const e=el(id);if(!e)return;
    const cur=e.value,isF=id==='ftinh';
    e.innerHTML=isF?'<option value="">📍 Tất cả tỉnh</option>':'<option value="">-- Chọn tỉnh --</option>';
    tinhs.forEach(t=>e.innerHTML+=`<option${t===cur?' selected':''}>${t}</option>`);
  });
  const fl=el('floai');if(fl){
    const cur=fl.value;
    fl.innerHTML='<option value="">🏪 Tất cả loại</option>';
    loais.forEach(l=>fl.innerHTML+=`<option${l===cur?' selected':''}>${l}</option>`);
  }
}

// ── TAB ───────────────────────────────────────────────────────────────────────
function switchTab(tab){
  ['list','cal','rpt'].forEach(t=>{
    const ti=el('tab-'+t),wi=el('wrap-'+t);
    if(ti)ti.classList.toggle('active',t===tab);
    if(wi)wi.style.display=t===tab?'':'none';
  });
  if(tab==='rpt')renderRpt();
  if(tab==='cal')renderCal();
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function fST(s){activeST=activeST===s?'':s;applyF();}
function applyF(){
  const q=(gv('fsearch')||'').toLowerCase();
  const tinh=gv('ftinh'),loai=gv('floai');
  filtered=DATA.filter(r=>{
    if(activeST&&r.status!==activeST)return false;
    if(tinh&&r.tinh!==tinh)return false;
    if(loai&&r.loai!==loai)return false;
    if(q){const h=(r.ten+r.sdt+r.tinh+r.loai+r.note).toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  renderList(q);updateStats();
}
function resetF(){
  sv('fsearch','');sv('ftinh','');sv('floai','');
  activeST='';applyF();
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function fuTagHTML(r){
  if(!r.followup)return'';
  const td=today();
  let cls,lbl;
  if(r.followup<td){const d=Math.round((new Date(td)-new Date(r.followup))/864e5);cls='fu-od';lbl=`⚠️ Quá hạn ${d} ngày`;}
  else if(r.followup===td){cls='fu-td';lbl='🔔 Gọi hôm nay!';}
  else{const d=Math.round((new Date(r.followup)-new Date(td))/864e5);cls='fu-ft';lbl=`📅 Gọi lại sau ${d} ngày (${r.followup.slice(5)})`;}
  return`<div class="fu-bar"><span class="fu-tag ${cls}">${lbl}</span></div>`;
}

function renderList(q=''){
  const p=el('list-panel');if(!p)return;
  if(!filtered.length){p.innerHTML='<div class="empty"><div style="font-size:36px">📭</div><div style="margin-top:8px">Không tìm thấy</div></div>';return;}
  p.innerHTML=filtered.map(r=>{
    const st=gST(r.status);
    const hasSdt=r.sdt&&r.sdt.length>=9;
    return`<div class="card s-${r.status||'chuagoi'}">
  <div class="card-top">
    <div class="cname">${hl(r.ten,q)}${r._new?' <span style="font-size:9px;color:#059669;font-weight:700">🆕</span>':''}</div>
    <div class="cmeta">
      ${r.tinh?`<span class="chip tinh">📍 ${r.tinh}</span>`:''}
      ${r.loai?`<span class="chip loai">🏪 ${r.loai}</span>`:''}
    </div>
  </div>
  <div class="sdt-section">
    ${hasSdt
      ?`<a class="call-btn" href="tel:${r.sdt}">📞 ${r.sdt}</a>`
      :`<div class="no-sdt">Chưa có SĐT — nhấn ✏️ để thêm</div>`}
  </div>
  <div class="card-acts">
    <button class="ebtn" onclick="showEdit('${r.id}')">✏️ Cập nhật</button>
    ${r.status!=='chuaquan'?`<button class="qbtn" onclick="quickCQ('${r.id}')">🟠 Chưa QT</button>`:''}
    <select class="ssel" onchange="quickST('${r.id}',this.value)">
      ${Object.entries(ST).map(([k,v])=>`<option value="${k}"${(r.status||'chuagoi')===k?' selected':''}>${v.label}</option>`).join('')}
    </select>
  </div>
  <div class="note-bar">
    <div class="sdot-s ${st.dot}"></div>
    ${r.note?`<div class="note-txt">📝 ${r.note}</div>`:`<div class="note-emp">Chưa có ghi chú</div>`}
  </div>
  ${fuTagHTML(r)}
</div>`;
  }).join('');
}

function updateStats(){
  const cnt={};Object.keys(ST).forEach(k=>cnt[k]=0);
  DATA.forEach(r=>{if(cnt[r.status]!==undefined)cnt[r.status]++;else cnt.chuagoi++;});
  if(el('sn-all'))el('sn-all').textContent=filtered.length;
  Object.keys(cnt).forEach(k=>{const e=el('sn-'+k);if(e)e.textContent=cnt[k];});
  Object.keys(ST).forEach(k=>{const e=el('st-'+k);if(e)e.classList.toggle('active',activeST===k);});
  if(el('st-all'))el('st-all').classList.toggle('active',activeST==='');
  // Cal badge
  const td=today();
  const urgent=DATA.filter(r=>r.followup&&r.followup<=td).length;
  const b=el('cal-badge');
  if(b){b.style.display=urgent>0?'inline':'none';b.textContent=urgent;}
  // Header
  const hs=el('hsub');
  if(hs)hs.textContent=`${filtered.length}/${DATA.length} KH · Quan tâm: ${cnt.quantam} · Chốt: ${cnt.chot}`;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCal(){
  const p=el('cal-panel');if(!p)return;
  const td=today();
  const overdue=DATA.filter(r=>r.followup&&r.followup<td).sort((a,b)=>a.followup.localeCompare(b.followup));
  const due=DATA.filter(r=>r.followup===td);
  const future=DATA.filter(r=>r.followup&&r.followup>td).sort((a,b)=>a.followup.localeCompare(b.followup));
  const total=overdue.length+due.length;
  let out=`<div class="cal-banner">
    <h2>📅 Lịch Follow Up</h2>
    <p>${total>0?`${total} cần gọi ngay · ${future.length} sắp tới`:future.length>0?`${future.length} lịch sắp tới`:'Không có lịch nào 🎉'}</p>
  </div>`;
  if(!overdue.length&&!due.length&&!future.length){
    out+=`<div class="cal-empty"><div style="font-size:40px">📭</div><div style="margin-top:10px;font-weight:600">Chưa có lịch nào</div></div>`;
    p.innerHTML=out;return;
  }
  if(overdue.length){
    out+=secHdr(`⚠️ Quá hạn — ${overdue.length} KH`,'#dc2626');
    overdue.forEach(r=>{const d=Math.round((new Date(td)-new Date(r.followup))/864e5);out+=calCard(r,'#dc2626',`Quá hạn ${d} ngày`);});
  }
  if(due.length){
    out+=secHdr(`🔔 Hôm nay — ${due.length} KH`,'#1d4ed8');
    due.forEach(r=>out+=calCard(r,'#1d4ed8','Hôm nay'));
  }
  const g={w1:[],w2:[],mo:[],later:[]};
  future.forEach(r=>{
    const d=Math.round((new Date(r.followup)-new Date(td))/864e5);
    if(d<=7)g.w1.push(r);else if(d<=14)g.w2.push(r);else if(d<=31)g.mo.push(r);else g.later.push(r);
  });
  [[g.w1,'#0369a1','📅 7 ngày tới'],[g.w2,'#4338ca','📅 8–14 ngày'],[g.mo,'#6b7280','📅 Trong tháng'],[g.later,'#9ca3af','📅 Xa hơn']]
    .forEach(([list,color,label])=>{
      if(!list.length)return;
      out+=secHdr(`${label} — ${list.length} KH`,color);
      list.forEach(r=>{
        const d=Math.round((new Date(r.followup)-new Date(td))/864e5);
        const fd=new Date(r.followup).toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit'});
        out+=calCard(r,color,`${fd} (còn ${d} ngày)`);
      });
    });
  p.innerHTML=out;
}
function secHdr(text,color){return`<div class="sec-hdr" style="color:${color};border-bottom-color:${color}40">${text}</div>`;}
function calCard(r,color,dayLabel){
  const hasSdt=r.sdt&&r.sdt.length>=9;
  return`<div class="cal-card" style="border-left-color:${color}">
  <div class="cal-card-body">
    <div class="cal-card-name">${r.ten}</div>
    <div class="cal-card-meta">${r.tinh||'—'}${r.loai?' · '+r.loai:''} · <b style="color:${color}">${dayLabel}</b></div>
    ${r.note?`<div style="font-size:11px;color:#6b7280;margin-top:3px;font-style:italic">📝 ${r.note}</div>`:''}
  </div>
  <div class="cal-card-acts">
    ${hasSdt?`<a class="call-btn" href="tel:${r.sdt}" style="flex:1;padding:7px 12px;font-size:13px">📞 ${r.sdt}</a>`:`<span style="flex:1;color:#9ca3af;font-size:12px">Chưa có SĐT</span>`}
    <button class="ebtn" onclick="showEditCal('${r.id}')">✏️</button>
    <button class="btn btn-gray" style="height:28px;font-size:10px;padding:0 8px" onclick="doneCal('${r.id}')">✓ Xong</button>
  </div>
</div>`;
}
function showEditCal(id){switchTab('list');setTimeout(()=>showEdit(id),200);}
function doneCal(id){updOV(id,{followup:''});renderCal();updateStats();schedSync();showToast('✅ Đã đánh dấu xong');}

// ── BÁO CÁO ──────────────────────────────────────────────────────────────────
function renderRpt(){
  const p=el('rpt-panel');if(!p)return;
  const cnt={};Object.keys(ST).forEach(k=>cnt[k]=0);
  DATA.forEach(r=>{if(cnt[r.status]!==undefined)cnt[r.status]++;else cnt.chuagoi++;});
  const total=DATA.length;
  const daCalls=total-cnt.chuagoi;
  const tienNang=cnt.quantam+cnt.choxem+cnt.chot;
  const td=today();
  const urgent=DATA.filter(r=>r.followup&&r.followup<=td).length;

  // Thống kê theo tỉnh
  const tinhStats={};
  DATA.forEach(r=>{
    if(!r.tinh)return;
    if(!tinhStats[r.tinh])tinhStats[r.tinh]={total:0,chot:0,quantam:0,called:0};
    tinhStats[r.tinh].total++;
    if(r.status!=='chuagoi')tinhStats[r.tinh].called++;
    if(r.status==='chot')tinhStats[r.tinh].chot++;
    if(r.status==='quantam'||r.status==='choxem')tinhStats[r.tinh].quantam++;
  });

  const maxCnt=Math.max(...Object.values(cnt));

  let out=`<div class="rpt-banner">
    <h2>📊 Báo cáo tổng quan</h2>
    <p>Cập nhật: ${new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</p>
  </div>
  <div class="rpt-grid">
    <div class="rpt-card"><div class="rpt-num">${total}</div><div class="rpt-lbl">Tổng KH</div></div>
    <div class="rpt-card blue"><div class="rpt-num">${daCalls}</div><div class="rpt-lbl">Đã liên hệ (${total?Math.round(daCalls/total*100):0}%)</div></div>
    <div class="rpt-card orange"><div class="rpt-num">${tienNang}</div><div class="rpt-lbl">Tiềm năng</div></div>
    <div class="rpt-card green"><div class="rpt-num">${cnt.chot}</div><div class="rpt-lbl">Chốt đơn 🎉</div></div>
    <div class="rpt-card red"><div class="rpt-num">${urgent}</div><div class="rpt-lbl">Cần gọi ngay 🔔</div></div>
    <div class="rpt-card"><div class="rpt-num">${DATA.filter(r=>r.note).length}</div><div class="rpt-lbl">Có ghi chú</div></div>
  </div>

  <div class="rpt-bar-wrap">
    <div class="rpt-bar-title">Phân bổ trạng thái</div>
    ${Object.entries(ST).map(([k,v])=>`
    <div class="rpt-row">
      <div class="rpt-row-lbl">${v.label}</div>
      <div class="rpt-row-bar"><div class="rpt-row-fill" style="width:${maxCnt?Math.round(cnt[k]/maxCnt*100):0}%;background:${v.color}"></div></div>
      <div class="rpt-row-cnt">${cnt[k]}</div>
    </div>`).join('')}
  </div>

  <div class="tinh-grid">
    <div class="rpt-bar-title" style="margin-bottom:6px">Theo tỉnh</div>
    <div class="tinh-row" style="font-weight:600;color:#374151;border-bottom:2px solid #e5e7eb">
      <span>Tỉnh</span><span>Tổng</span><span>Đã gọi</span><span>Chốt</span>
    </div>
    ${Object.entries(tinhStats).sort((a,b)=>b[1].total-a[1].total).map(([t,s])=>`
    <div class="tinh-row">
      <span style="color:#065f46;font-weight:500">📍${t}</span>
      <span>${s.total}</span>
      <span style="color:#2563eb">${s.called}</span>
      <span style="color:#059669;font-weight:600">${s.chot||'—'}</span>
    </div>`).join('')}
  </div>`;
  p.innerHTML=out;
}

// ── QUICK ACTIONS ─────────────────────────────────────────────────────────────
function quickST(id,val){if(!ST[val])val='chuagoi';updOV(id,{status:val});applyF();schedSync();}
function quickCQ(id){
  const d=new Date();d.setMonth(d.getMonth()+2);
  updOV(id,{status:'chuaquan',followup:d.toISOString().slice(0,10)});
  applyF();schedSync();
  showToast(`🟠 Chưa QT — hẹn ${d.toLocaleDateString('vi-VN')}`);
}

// ── FOLLOWUP ──────────────────────────────────────────────────────────────────
function onSTC(val){
  const h=el('fu-quick');if(h)h.style.display=NEED_FU.includes(val)?'block':'none';
}
function setFU(days){
  const d=new Date();
  if(days>=30)d.setMonth(d.getMonth()+Math.floor(days/30));else d.setDate(d.getDate()+days);
  const s=d.toISOString().slice(0,10);sv('e-followup',s);
  const lbl=days===1?'ngày mai':days<30?`${days} ngày nữa`:days===30?'1 tháng nữa':'2 tháng nữa';
  showToast(`📅 Hẹn: ${lbl} (${d.toLocaleDateString('vi-VN')})`);
}

// ── EDIT MODAL ────────────────────────────────────────────────────────────────
function showEdit(id){
  editId=id;const r=DATA.find(x=>x.id===id);if(!r)return;
  const et=el('edit-title');if(et)et.textContent='✏️ '+(r.ten.length>26?r.ten.slice(0,26)+'...':r.ten);
  sv('e-sdt',r.sdt);sv('e-status',r.status||'chuagoi');
  sv('e-note',r.note);sv('e-followup',r.followup);
  onSTC(r.status||'chuagoi');
  const m=el('edit-modal');if(m){m.style.display='flex';setTimeout(()=>{const md=m.querySelector('.modal');if(md)md.scrollTop=0;},50);}
}
function closeEdit(){const m=el('edit-modal');if(m)m.style.display='none';editId=null;}
function saveEdit(){
  if(!editId){closeEdit();return;}
  const patch={sdt:gv('e-sdt'),status:gv('e-status')||'chuagoi',note:gv('e-note'),followup:gv('e-followup')};
  updOV(editId,patch);
  closeEdit();applyF();schedSync();showToast('✅ Đã lưu — đang đồng bộ...');
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────────
function showAdd(){const m=el('add-modal');if(m){m.style.display='flex';setTimeout(()=>{const e=el('a-ten');if(e)e.focus();},100);}}
function closeAdd(){const m=el('add-modal');if(m)m.style.display='none';}
function addContact(){
  const ten=gv('a-ten');if(!ten){alert('Vui lòng nhập tên!');return;}
  const sdt=gv('a-sdt');
  const id='c_'+Date.now();
  const r={id,_new:true,ten,sdt,tinh:gv('a-tinh'),loai:gv('a-loai')||'Cửa hàng VLXD',
    note:gv('a-note'),followup:gv('a-followup'),status:'chuagoi'};
  CUSTOM.unshift(r);DATA.unshift(r);
  buildDropdowns();
  ['a-ten','a-sdt','a-loai','a-note','a-followup'].forEach(id=>sv(id,''));
  sv('a-tinh','');
  closeAdd();applyF();schedSync();showToast('✅ Đã thêm — đang đồng bộ...');
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function doExport(){
  const rows=[['Tên','SĐT','Tỉnh','Loại','Trạng thái','Follow up','Ghi chú']];
  DATA.forEach(r=>rows.push([r.ten,r.sdt,r.tinh,r.loai,gST(r.status).label,r.followup||'',r.note||'']));
  const csv=rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='DLC2_CRM_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadCloud().then(()=>applyF());
